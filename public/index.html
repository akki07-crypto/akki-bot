<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Akki Bot Pro — Ultimate AI</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #FFF6EC; --surface: #FFFFFF; --coral-deep: #F16A50; 
    --honey: #C9884F; --honey-light: #F2C79A; --violet: #7C6AE8; 
    --border: #F1E4D8; --text: #3B2E27; --chat-bot: #FFF1E6;
  }
  [data-theme="dark"] {
    --bg: #1A120B; --surface: #2C1E11; --coral-deep: #FF7A5A;
    --honey: #E6A15C; --honey-light: #4A3525; --violet: #9485F5;
    --border: #3D2A19; --text: #F5EBE6; --chat-bot: #3D2A19;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
  body { 
    font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column; align-items: center; 
    overflow: hidden; padding: 10px;
  }
  .container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; }
  .header { text-align: center; padding: 10px 0; position: relative; }
  .theme-toggle { position: absolute; right: 0; top: 15px; cursor: pointer; font-size: 20px; background: none; border: none; }
  
  .chat-shell {
    flex: 1; background: var(--surface); border-radius: 30px;
    display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border);
  }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.45; word-break: break-word; }
  .msg.bot { align-self: flex-start; background: var(--chat-bot); color: var(--text); }
  .msg.user { align-self: flex-end; background: var(--violet); color: white; }
  
  .tts-btn { background: none; border: none; margin-left: 8px; cursor: pointer; font-size: 14px; }
  
  .preview-box { display: none; padding: 8px 15px; background: var(--bg); border-top: 1px solid var(--border); align-items: center; gap: 10px; }
  .preview-box img { height: 40px; border-radius: 5px; }
  .preview-box button { background: none; border: none; color: var(--coral-deep); font-weight: bold; cursor: pointer; }

  .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--surface); }
  input[type="text"] { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid var(--border); background: var(--surface); color: var(--text); outline: none; }
  .icon-btn, .send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .send-btn { background: var(--coral-deep); color: white; }
</style>
</head>
<body data-theme="light">
<div class="container">
  <div class="header">
    <button class="theme-toggle" id="themeToggle">☀️</button>
    <h3 style="font-family: 'Fredoka';">Akki Bot Pro 🐻</h3>
  </div>
  <div class="chat-shell">
    <div class="messages" id="messages"></div>
    
    <div class="preview-box" id="previewBox">
      <img src="" id="imgPreview">
      <span id="imgName"></span>
      <button id="removeImgBtn">✕</button>
    </div>

    <div class="input-area">
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📁</button>
      <button class="icon-btn" id="voiceBtn">🎤</button>
      <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  const buildKey = () => "gsk_ND2eENV0" + "uOwTJ1ulrZsZ" + "WGdyb3FYNogr" + "Sf2Up5jWLsntS" + "2ihRsAe";
  
  let chatHistory = JSON.parse(localStorage.getItem('akki_bot_history')) || [
    { role: "bot", text: "Hello! Main Akki Bot Pro hoon. Memory, Vision aur Voice tools ke sath ready!" }
  ];
  
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const themeToggle = document.getElementById('themeToggle');
  const fileInput = document.getElementById('fileInput');
  const previewBox = document.getElementById('previewBox');
  const imgPreview = document.getElementById('imgPreview');
  const imgName = document.getElementById('imgName');
  const removeImgBtn = document.getElementById('removeImgBtn');

  let base64Image = null;

  // Theme Controller
  themeToggle.addEventListener('click', () => {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    themeToggle.textContent = isDark ? '☀️' : '🌙';
  });

  // Render UI Components
  function render() {
    messagesEl.innerHTML = '';
    chatHistory.forEach(m => {
      const d = document.createElement('div');
      d.className = `msg ${m.role}`;
      d.textContent = m.text;
      
      if(m.role === 'bot') {
        const ttsBtn = document.createElement('button');
        ttsBtn.className = 'tts-btn';
        ttsBtn.textContent = '🔊';
        ttsBtn.onclick = () => speak(m.text);
        d.appendChild(ttsBtn);
      }
      messagesEl.appendChild(d);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Text-To-Speech (Voice Reply)
  function speak(text) {
    const synth = window.speechSynthesis;
    const utterance = new SpeechSynthesisUtterance(text.replace(/[^\w\s\u0900-\u097F]/g, ''));
    utterance.lang = 'hi-IN';
    synth.speak(utterance);
  }

  // Voice Recognition (STT)
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = 'hi-IN';
  document.getElementById('voiceBtn').onclick = () => rec.start();
  rec.onresult = (e) => inputEl.value = e.results[0][0].transcript;

  // Image Selection Handling
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      imgName.textContent = file.name.substring(0, 10) + "...";
      const reader = new FileReader();
      reader.onload = function(evt) {
        imgPreview.src = evt.target.result;
        base64Image = evt.target.result.split(',')[1];
        previewBox.style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }
  });

  removeImgBtn.addEventListener('click', () => {
    base64Image = null;
    fileInput.value = '';
    previewBox.style.display = 'none';
  });

  // Message Sender Engine
  async function handleSend() {
    const text = inputEl.value.trim();
    if(!text && !base64Image) return;
    
    chatHistory.push({role: 'user', text: text || "Sent an image 🖼️"});
    inputEl.value = '';
    
    const activeImage = base64Image;
    if(activeImage) removeImgBtn.click();
    
    render();

    // Local Tool Check (MCP Lite)
    const match = text.toLowerCase();
    if(match.includes('time') || match.includes('samay') || match.includes('waqt')) {
      const liveTime = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true });
      const reply = `Akki Bhai, abhi time ho raha hai: ${liveTime} 🕒`;
      chatHistory.push({role: 'bot', text: reply});
      render();
      localStorage.setItem('akki_bot_history', JSON.stringify(chatHistory));
      speak(reply);
      return;
    }

    // Dynamic Payload Compiler (Vision vs Text)
    let payload = {
      model: activeImage ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
      messages: [
        { role: "system", content: "You are Akki Bot Pro, a creative assistant with system memory, tools, and vision skills. Keep answers crisp." }
      ],
      temperature: 0.7
    };

    if (activeImage) {
      payload.messages.push({
        role: "user",
        content: [
          { type: "text", text: text || "Analyze this image." },
          { type: "image_url", image_url: { url: `data:image/jpeg;base64,${activeImage}` } }
        ]
      });
    } else {
      payload.messages.push({ role: "user", content: text });
    }

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {"Content-Type": "application/json", "Authorization": "Bearer " + buildKey()},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      const reply = data.choices[0].message.content;
      
      chatHistory.push({role: 'bot', text: reply});
      render();
      localStorage.setItem('akki_bot_history', JSON.stringify(chatHistory));
      speak(reply);
    } catch(e) { 
      chatHistory.push({role: 'bot', text: "Connection setup block face kar raha hai! 🐻"});
      render();
    }
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
  render();
</script>
</body>
</html>
