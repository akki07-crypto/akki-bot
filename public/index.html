<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Akki Bot Pro — Ultimate AI</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #FFF6EC; --surface: #FFFFFF; --coral-deep: #F16A50; 
    --honey: #C9884F; --honey-light: #F2C79A; --violet: #7C6AE8; 
    --border: #F1E4D8; --text: #3B2E27; --chat-bot: #FFF1E6;
  }
  [data-theme="dark"] {
    --bg: #1A120B; --surface: #2C1E11; --coral-deep: #FF7A5A;
    --honey: #E6A15C; --honey-light: #4A3525; --violet: #9485F5;
    --border: #3D2A19; --text: #F5EBE6; --chat-bot: #3D2A19;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
  body { 
    font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column; align-items: center; 
    overflow: hidden; padding: 10px;
  }
  .container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; }
  
  .header { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .header-top { width: 100%; display: flex; justify-content: space-between; align-items: center; }
  .header-controls { display: flex; gap: 8px; align-items: center; }
  
  .control-btn { cursor: pointer; font-size: 18px; background: none; border: none; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
  
  .header-selectors { width: 100%; display: flex; gap: 8px; }
  select, .prompt-toggle-btn { 
    flex: 1; background: var(--surface); border: 1.5px solid var(--border); padding: 6px 10px; 
    border-radius: 15px; font-size: 11px; font-weight: bold; color: var(--text); outline: none; cursor: pointer;
    text-align: center;
  }
  .prompt-toggle-btn.active { background: var(--honey); color: white; border-color: var(--honey); }

  .chat-shell {
    flex: 1; background: var(--surface); border-radius: 25px; margin-top: 10px;
    display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border);
  }
  .messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 16px; }
  
  .msg-row { display: flex; width: 100%; gap: 10px; align-items: flex-end; }
  .msg-row.user { flex-direction: row-reverse; }
  
  .avatar { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; border: 1px solid var(--border); }
  .msg-row.bot .avatar { background: var(--chat-bot); }
  .msg-row.user .avatar { background: var(--violet); color: white; }

  .msg { max-width: 78%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.45; word-break: break-word; }
  .msg.bot { background: var(--chat-bot); color: var(--text); border-bottom-left-radius: 4px; }
  .msg.user { background: var(--violet); color: white; border-bottom-right-radius: 4px; }
  
  .blueprint-table { width: 100%; border-collapse: collapse; margin-top: 8px; font-size: 12px; background: var(--surface); border-radius: 8px; overflow: hidden; }
  .blueprint-table th, .blueprint-table td { border: 1px solid var(--border); padding: 6px; text-align: left; }
  .blueprint-table th { background: var(--honey-light); color: #3B2E27; }

  .gen-img, .inline-user-img { width: 100%; max-width: 100%; border-radius: 12px; margin-top: 10px; border: 1px solid var(--border); display: block; }

  .action-buttons { display: flex; gap: 8px; margin-top: 8px; align-items: center; flex-wrap: wrap; }
  .inline-btn { background: var(--bg); border: none; padding: 5px 10px; border-radius: 10px; cursor: pointer; font-size: 11px; font-weight: 600; color: var(--text); display: inline-flex; align-items: center; gap: 3px; }
  
  .preview-box { display: none; padding: 8px 15px; background: var(--bg); border-top: 1px solid var(--border); align-items: center; gap: 10px; }
  .preview-box img { height: 40px; border-radius: 5px; }
  .preview-box button { background: none; border: none; color: var(--coral-deep); font-weight: bold; cursor: pointer; }

  .input-area { padding: 12px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--surface); }
  input[type="text"] { flex: 1; padding: 10px 16px; border-radius: 20px; border: 2px solid var(--border); background: var(--surface); color: var(--text); outline: none; }
  .icon-btn, .send-btn { width: 40px; height: 40px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .send-btn { background: var(--coral-deep); color: white; }
</style>
</head>
<body data-theme="light">
<div class="container">
  <div class="header">
    <div class="header-top">
      <h3 style="font-family: 'Fredoka';">Akki Bot Pro <span id="botFace">🐻</span></h3>
      <div class="header-controls">
        <button class="control-btn" id="muteToggle" title="Mute/Unmute">🔊</button>
        <button class="control-btn" id="themeToggle" title="Theme">☀️</button>
      </div>
    </div>
    <div class="header-selectors">
      <select id="workspaceSelect">
        <option value="default">📁 Workspace: General</option>
        <option value="monster">🎬 Workspace: Monster Cinematic</option>
        <option value="thriller">🧠 Workspace: Psychological Thriller</option>
      </select>
      <button class="prompt-toggle-btn" id="promptModeToggle">🤖 NORMAL CHAT</button>
    </div>
  </div>

  <div class="chat-shell">
    <div class="messages" id="messages"></div>
    
    <div class="preview-box" id="previewBox">
      <img src="" id="imgPreview">
      <span id="imgName" style="font-size: 12px; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;"></span>
      <button id="removeImgBtn">✕</button>
    </div>

    <div class="input-area">
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📁</button>
      <button class="icon-btn" id="voiceBtn">🎤</button>
      <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  const buildKey = () => "gsk_ND2eENV0" + "uOwTJ1ulrZsZ" + "WGdyb3FYNogr" + "Sf2Up5jWLsntS" + "2ihRsAe";
  
  let currentWorkspace = 'default';
  let isMuted = localStorage.getItem('akki_bot_muted') === 'true';
  let promptMode = 'normal'; 

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const themeToggle = document.getElementById('themeToggle');
  const muteToggle = document.getElementById('muteToggle');
  const promptModeToggle = document.getElementById('promptModeToggle');
  const workspaceSelect = document.getElementById('workspaceSelect');
  const fileInput = document.getElementById('fileInput');
  const previewBox = document.getElementById('previewBox');
  const imgPreview = document.getElementById('imgPreview');
  const removeImgBtn = document.getElementById('removeImgBtn');
  const voiceBtn = document.getElementById('voiceBtn');
  const botFace = document.getElementById('botFace');

  let base64Image = null;
  muteToggle.textContent = isMuted ? '🔇' : '🔊';

  function getHistory() {
    let allHistory = JSON.parse(localStorage.getItem('akki_workspaces')) || {};
    if (!allHistory[currentWorkspace]) {
      allHistory[currentWorkspace] = [{ role: "bot", text: "Hello Akki Bhai! Main aapka smart AI assistant hoon. Poochiye kya puchna hai ya fir boliyie koi image generate karne ko!" }];
    }
    return allHistory[currentWorkspace];
  }

  function saveHistory(history) {
    let allHistory = JSON.parse(localStorage.getItem('akki_workspaces')) || {};
    allHistory[currentWorkspace] = history;
    localStorage.setItem('akki_workspaces', JSON.stringify(allHistory));
  }

  workspaceSelect.addEventListener('change', (e) => {
    currentWorkspace = e.target.value;
    render();
  });

  promptModeToggle.addEventListener('click', () => {
    promptMode = promptMode === 'normal' ? 'video' : 'normal';
    promptModeToggle.textContent = promptMode === 'video' ? "🎬 PROMPT MODE" : "🤖 NORMAL CHAT";
    promptModeToggle.classList.toggle('active', promptMode === 'video');
  });

  muteToggle.addEventListener('click', () => {
    isMuted = !isMuted;
    muteToggle.textContent = isMuted ? '🔇' : '🔊';
    localStorage.setItem('akki_bot_muted', isMuted);
    if(isMuted) window.speechSynthesis.cancel();
  });

  themeToggle.addEventListener('click', () => {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    themeToggle.textContent = isDark ? '☀️' : '🌙';
  });

  function formatMarkdown(text) {
    if (text.includes('|') && text.includes('---')) {
      let lines = text.trim().split('\n');
      let tableHtml = '<table class="blueprint-table"><thead>';
      let startTable = false;
      let hasBody = false;
      
      lines.forEach((line) => {
        if (line.includes('|')) {
          let cols = line.split('|').map(c => c.trim()).filter(c => c !== '');
          if (line.includes('---')) return;
          if (!startTable) {
            tableHtml += '<tr>' + cols.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
            startTable = true;
            hasBody = true;
          } else {
            tableHtml += '<tr>' + cols.map(c => `<td>${c}</td>`).join('') + '</tr>';
          }
        }
      });
      if(hasBody) tableHtml += '</tbody>';
      tableHtml += '</table>';
      return tableHtml;
    }

    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function render() {
    messagesEl.innerHTML = '';
    let history = getHistory();
    history.forEach((m) => {
      const row = document.createElement('div');
      row.className = `msg-row ${m.role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = m.role === 'bot' ? '🐻' : '👤';
      row.appendChild(avatar);

      const d = document.createElement('div');
      d.className = `msg ${m.role}`;
      d.innerHTML = formatMarkdown(m.text);
      
      if(m.userUploadedImg) {
        const uImg = document.createElement('img');
        uImg.src = `data:image/jpeg;base64,${m.userUploadedImg}`;
        uImg.className = 'inline-user-img';
        d.appendChild(uImg);
      }

      if(m.imageGenUrl) {
        const img = document.createElement('img');
        img.src = m.imageGenUrl;
        img.className = 'gen-img';
        d.appendChild(img);
      }

      if(m.role === 'bot') {
        const btnWrapper = document.createElement('div');
        btnWrapper.className = 'action-buttons';
        
        const ttsBtn = document.createElement('button');
        ttsBtn.className = 'inline-btn';
        ttsBtn.textContent = '🗣️ Listen'; 
        ttsBtn.onclick = () => speak(m.text, true); 
        btnWrapper.appendChild(ttsBtn);

        const copyBtn = document.createElement('button');
        copyBtn.className = 'inline-btn';
        copyBtn.textContent = '📋 Copy'; 
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(m.text);
          copyBtn.textContent = '✅ Copied';
          setTimeout(() => copyBtn.textContent = '📋 Copy', 1500);
        };
        btnWrapper.appendChild(copyBtn);
        
        d.appendChild(btnWrapper);
      }
      row.appendChild(d);
      messagesEl.appendChild(row);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function streamBotReply(fullText) {
    botFace.textContent = '🧐';
    let history = getHistory();
    
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    const avatar = document.createElement('div');
    avatar.className = 'avatar'; avatar.textContent = '🐻';
    row.appendChild(avatar);

    const d = document.createElement('div');
    d.className = 'msg bot';
    row.appendChild(d);
    messagesEl.appendChild(row);
    
    let currentIdx = 0;
    const words = fullText.split(' ');
    
    function typeWord() {
      if (currentIdx < words.length) {
        d.innerHTML = formatMarkdown(words.slice(0, currentIdx + 1).join(' '));
        messagesEl.scrollTop = messagesEl.scrollHeight;
        currentIdx++;
        setTimeout(typeWord, 35);
      } else {
        botFace.textContent = '🐻';
        history.push({role: 'bot', text: fullText});
        saveHistory(history);
        render();
        speak(fullText);
      }
    }
    typeWord();
  }

  // DIRECT AUTOGEN IMAGE INSERTER ENGINE
  function triggerDirectImageGen(promptKeyword) {
    botFace.textContent = '🎨';
    let history = getHistory();
    const cleanPrompt = encodeURIComponent(promptKeyword.trim());
    const seed = Math.floor(Math.random() * 100000);
    const generatedUrl = `https://image.pollinations.ai/p/${cleanPrompt}?width=600&height=400&seed=${seed}&nologo=true`;
    
    history.push({
      role: 'bot', 
      text: `Bhai, aapke kehne par maine **"${promptKeyword}"** ki image generate kar di hai! 🚀`,
      imageGenUrl: generatedUrl
    });
    saveHistory(history);
    render();
    botFace.textContent = '🐻';
  }

  function speak(text, forceSpeak = false) {
    if (isMuted && !forceSpeak) return;
    window.speechSynthesis.cancel();
    const synth = window.speechSynthesis;
    const utterance = new SpeechSynthesisUtterance(text.replace(/[^\w\s\u0900-\u097F]/g, ''));
    utterance.lang = 'hi-IN';
    synth.speak(utterance);
  }

  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = 'hi-IN';
  voiceBtn.onclick = () => { botFace.textContent = '👂'; rec.start(); };
  rec.onresult = (e) => { inputEl.value = e.results[0][0].transcript; botFace.textContent = '🐻'; };

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      document.getElementById('imgName').textContent = file.name;
      const reader = new FileReader();
      reader.onload = function(evt) {
        imgPreview.src = evt.target.result;
        base64Image = evt.target.result.split(',')[1];
        previewBox.style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }
  });

  removeImgBtn.addEventListener('click', () => { base64Image = null; previewBox.style.display = 'none'; fileInput.value = ''; });

  async function handleSend() {
    const text = inputEl.value.trim();
    if(!text && !base64Image) return;
    
    let history = getHistory();
    let newMsg = {role: 'user', text: text || "Sent an image 🖼️"};
    if(base64Image) {
      newMsg.userUploadedImg = base64Image;
    }
    history.push(newMsg);
    saveHistory(history); 
    
    inputEl.value = '';
    const activeImage = base64Image;
    if(activeImage) {
      base64Image = null;
      fileInput.value = '';
      previewBox.style.display = 'none';
    }
    
    render();

    // --- AUTOMATIC AUTO-IMAGE ROUTER SYSTEM ---
    const match = text.toLowerCase();
    if(!activeImage && (match.includes('generate') || match.includes('image') || match.includes('photo') || match.includes('draw') || match.includes('pic') || match.includes('banao'))) {
      let subject = text.replace(/(generate|image|photo|draw|pic|banao|a|an|of|me|krke|do)/gi, "").trim();
      if(subject.length === 0) subject = "Beautiful abstract dynamic concept artwork";
      triggerDirectImageGen(subject);
      return;
    }

    botFace.textContent = '🤔';

    if(match.includes('time') || match.includes('samay') || match.includes('waqt')) {
      const liveTime = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true });
      streamBotReply(`Akki Bhai, abhi time ho raha hai: ${liveTime} 🕒`);
      return;
    }

    let systemPrompt = "You are Akki Bot Pro, a friendly, ultra-smart conversational AI chatbot created by Akki (Gernative Akki). Answer naturally and professionally like a human peer chatbot helper. Only use markdown tables if the user explicitly asks for a full multi-scene script or video timeline blueprint.";
    if (promptMode === 'video') {
      systemPrompt = "You are Akki Bot Pro, an elite expert AI Video Production Scriptwriter. Deliver structural scripts in tables when requested, or give cinematic prompts in regular prose.";
    }

    let apiMessages = [{ role: "system", content: systemPrompt }];
    
    if (activeImage) {
      apiMessages.push({
        role: "user",
        content: [
          { type: "text", text: text || "Bhai ye image check karo aur batao ye kya hai." },
          { type: "image_url", image_url: { url: `data:image/jpeg;base64,${activeImage}` } }
        ]
      });
    } else {
      history.slice(-5).forEach(h => {
        if (h.text && !h.text.includes("API Connection error") && !h.userUploadedImg) {
          apiMessages.push({ role: h.role === 'bot' ? 'assistant' : 'user', content: h.text });
        }
      });
      apiMessages.push({ role: "user", content: text });
    }

    let payload = {
      model: activeImage ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
      messages: apiMessages,
      temperature: 0.7
    };

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {"Content-Type": "application/json", "Authorization": "Bearer " + buildKey()},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if(data.choices && data.choices[0]) {
        streamBotReply(data.choices[0].message.content);
      }
    } catch(e) { 
      streamBotReply("API Connection configuration error face kar raha hai! 🐻");
    }
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
  render();
</script>
</body>
</html>
