<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Akki Bot — AI Buddy</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #FFF6EC; --surface: #FFFFFF; --coral-deep: #F16A50; 
    --honey: #C9884F; --honey-light: #F2C79A; --violet: #7C6AE8; 
    --border: #F1E4D8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: 'Nunito', sans-serif; background: var(--bg); color: #3B2E27;
    height: 100dvh; display: flex; flex-direction: column; align-items: center; 
    overflow: hidden; padding: 10px; position: relative;
  }
  .container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; }
  .header { text-align: center; padding: 10px 0; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
  .teddy-stage { width: 80px; height: 80px; margin-bottom: 5px; }
  .chat-shell {
    flex: 1; background: var(--surface); border-radius: 30px;
    display: flex; flex-direction: column; overflow: hidden;
    box-shadow: 0 10px 30px rgba(59,46,39,0.06); border: 1px solid var(--border);
  }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
  .msg { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.45; word-break: break-word; }
  .msg.bot { align-self: flex-start; background: #FFF1E6; border-bottom-left-radius: 4px; color: #3B2E27; }
  .msg.user { align-self: flex-end; background: var(--violet); color: white; border-bottom-right-radius: 4px; }
  .typing { align-self: flex-start; display: flex; gap: 4px; background: #FFF1E6; padding: 12px 16px; border-radius: 18px 18px 18px 4px; }
  .typing span { width: 6px; height: 6px; border-radius: 50%; background: var(--honey); animation: bounce 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%,60%,100% { transform: translateY(0); opacity: 0.5; } 30% { transform: translateY(-5px); opacity: 1; } }
  .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; gap: 10px; background: var(--surface); }
  input { flex: 1; padding: 12px 20px; border-radius: 25px; border: 2px solid var(--border); outline: none; font-family: inherit; font-size: 14.5px; }
  input:focus { border-color: var(--coral-deep); }
  button { 
    width: 45px; height: 45px; border-radius: 50%; border: none; 
    background: linear-gradient(135deg, #FF8A73, var(--coral-deep)); color: white; cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  #earL, #earR { transition: transform 0.3s ease; }
  #eyeL, #eyeR { transition: transform 0.15s ease; }
  #armR { transition: transform 0.3s ease; }
  body[data-state="idle"] #teddy { animation: breathe 3.2s ease-in-out infinite; }
  @keyframes breathe { 0%,100% { transform: scale(1); } 50% { transform: scale(1.03); } }
  body[data-state="idle"] #eyeL, body[data-state="idle"] #eyeR { animation: blink 4.5s ease-in-out infinite; }
  @keyframes blink { 0%,92%,100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
  body[data-state="listening"] #earL { transform: rotate(-6deg); }
  body[data-state="listening"] #earR { transform: rotate(6deg); }
  body[data-state="thinking"] #teddy { animation: tilt 1.4s ease-in-out infinite; }
  @keyframes tilt { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(3deg); } }
  body[data-state="thinking"] #eyeL, body[data-state="thinking"] #eyeR { transform: scaleY(0.5); }
  body[data-state="talking"] #armR { animation: wave 0.5s ease-in-out infinite; }
  @keyframes wave { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(-15deg); } }
</style>
</head>
<body data-state="idle">

<div class="container">
  <div class="header">
    <div class="teddy-stage">
      <svg id="teddy" viewBox="0 0 200 200" width="100%" height="100%">
        <g id="earL" style="transform-origin:52px 48px;"><circle cx="52" cy="48" r="26" fill="var(--honey)"/><circle cx="52" cy="48" r="13" fill="var(--honey-light)"/></g>
        <g id="earR" style="transform-origin:148px 48px;"><circle cx="148" cy="48" r="26" fill="var(--honey)"/><circle cx="148" cy="48" r="13" fill="var(--honey-light)"/></g>
        <circle cx="100" cy="105" r="70" fill="var(--honey)"/>
        <ellipse cx="100" cy="128" rx="34" ry="26" fill="var(--honey-light)"/>
        <g id="eyeL" style="transform-origin:78px 100px;"><circle cx="78" cy="100" r="9" fill="#3B2E27"/><circle cx="81" cy="97" r="3" fill="#fff"/></g>
        <g id="eyeR" style="transform-origin:122px 100px;"><circle cx="122" cy="100" r="9" fill="#3B2E27"/><circle cx="125" cy="97" r="3" fill="#fff"/></g>
        <ellipse cx="100" cy="118" rx="8" ry="6" fill="#3B2E27"/>
        <path id="mouth" d="M 84 134 Q 100 144 116 134" stroke="#3B2E27" stroke-width="3.5" fill="none" stroke-linecap="round"/>
        <g id="armR" style="transform-origin:162px 150px;"><ellipse cx="168" cy="152" rx="14" ry="20" fill="var(--honey)"/></g>
      </svg>
    </div>
    <h3 style="font-family: 'Fredoka', sans-serif;">Akki Bot 🐻</h3>
  </div>

  <div class="chat-shell">
    <div class="messages" id="messages">
      <div class="msg bot">Hey there! Main Akki Bot hoon 🐻 Kuch bhi pucho, main ready hoon!</div>
    </div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Type a message..." autocomplete="off">
      <button id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  const body = document.body;
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const mouth = document.getElementById('mouth');

  function setState(state) { 
    body.setAttribute('data-state', state); 
    if(state === 'thinking') { mouth.setAttribute('d', 'M 88 136 Q 100 132 112 136'); } 
    else if(state === 'idle' || state === 'listening') { mouth.setAttribute('d', 'M 84 134 Q 100 144 116 134'); }
  }

  inputEl.addEventListener('input', () => { setState(inputEl.value.length ? 'listening' : 'idle'); });

  function showTyping() {
    const div = document.createElement('div'); div.className = 'typing'; div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    messagesEl.appendChild(div); messagesEl.scrollTop = messagesEl.scrollHeight;
  }
  
  function hideTyping() { const t = document.getElementById('typingIndicator'); if(t) t.remove(); }

  let talkInterval;
  function startTalking() {
    let open = false;
    talkInterval = setInterval(() => {
      mouth.setAttribute('d', open ? 'M 84 134 Q 100 144 116 134' : 'M 88 132 Q 100 150 112 132');
      open = !open;
    }, 180);
  }
  function stopTalking() { clearInterval(talkInterval); mouth.setAttribute('d', 'M 84 134 Q 100 144 116 134'); }

  async function getBotReply(text) {
    try {
      // Direct call to your own local node server backend endpoint
      const response = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: text })
      });
      const data = await response.json();
      return data.reply;
    } catch (e) { return "Teddy connected nahi ho pa raha hai server se! 🐻"; }
  }

  async function handleSend() {
    const text = inputEl.value.trim(); if(!text) return;
    const userDiv = document.createElement('div'); userDiv.className = 'msg user'; userDiv.textContent = text;
    messagesEl.appendChild(userDiv); inputEl.value = ''; messagesEl.scrollTop = messagesEl.scrollHeight;

    setState('thinking'); showTyping();
    const reply = await getBotReply(text);
    
    hideTyping(); setState('talking'); startTalking();
    const botDiv = document.createElement('div'); botDiv.className = 'msg bot'; botDiv.textContent = reply;
    messagesEl.appendChild(botDiv); messagesEl.scrollTop = messagesEl.scrollHeight;
    
    setTimeout(() => { setState('idle'); stopTalking(); }, 1200);
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keypress', (e) => { if(e.key === 'Enter') handleSend(); });
</script>
</body>
</html>
