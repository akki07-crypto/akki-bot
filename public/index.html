<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akki Bot AI</title>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #e0f2fe 0%, #f8fafc 100%); /* Light Sky Blue to Soft White */
            --primary-blue: #0284c7; /* Professional Sky Blue */
            --dark-blue: #0f172a; /* Deep Slate Blue for Text/Headers */
            --white: #ffffff;
            --chat-bg: #f1f5f9;
            --text-main: #334155;
            --shadow: 0 10px 25px -5px rgba(2, 132, 199, 0.1), 0 8px 10px -6px rgba(2, 132, 199, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
        }

        /* Main Glassmorphism Container */
        .chat-container {
            width: 100%;
            max-width: 450px;
            height: 85vh;
            background: var(--white);
            border-radius: 24px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(14, 165, 233, 0.15);
        }

        /* Top Header Styling */
        .chat-header {
            background: linear-gradient(135deg, var(--dark-blue) 0%, #1e293b 100%);
            color: var(--white);
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            border-bottom: 3px solid var(--primary-blue);
        }

        .bot-avatar {
            width: 45px;
            height: 45px;
            background: rgba(2, 132, 199, 0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            font-size: 20px;
            box-shadow: 0 0 10px rgba(2, 132, 199, 0.5);
        }

        .bot-info h3 {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .bot-status {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 12px;
            color: #38bdf8; /* Soft Sky Blue */
            margin-top: 2px;
        }

        .status-dot {
            width: 7px;
            height: 7px;
            background-color: #4ade80; /* Online Green */
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        /* Chat Body / Messages Area */
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            background-color: #fafafa;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .message {
            max-width: 75%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 2px;
        }

        /* Bot Message (Left Side) */
        .bot-msg {
            background-color: var(--chat-bg);
            color: var(--dark-blue);
            align-self: flex-start;
            border-top-left-radius: 4px;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        /* User Message (Right Side) */
        .user-msg {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #0369a1 100%);
            color: var(--white);
            align-self: flex-end;
            border-top-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(2, 132, 199, 0.2);
        }

        /* Input Area Footer */
        .chat-input-area {
            padding: 15px 20px;
            background: var(--white);
            border-top: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .input-wrapper {
            position: relative;
            flex: 1;
        }

        #userInput {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid #e2e8f0;
            border-radius: 30px;
            outline: none;
            font-size: 14px;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        #userInput:focus {
            border-color: var(--primary-blue);
            background-color: var(--white);
            box-shadow: 0 0 0 4px rgba(2, 132, 199, 0.15);
        }

        .send-btn {
            background: linear-gradient(135deg, var(--primary-blue) 0%, #0369a1 100%);
            color: var(--white);
            border: none;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(2, 132, 199, 0.3);
        }

        .send-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 16px rgba(2, 132, 199, 0.4);
        }

        .send-btn:active {
            transform: scale(0.95);
        }

        /* Animation */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* Custom Scrollbar */
        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }
        .chat-messages::-webkit-scrollbar-thumb {
            background-color: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Header -->
        <div class="chat-header">
            <div class="bot-avatar">
                <i class="fa-solid fa-robot"></i>
            </div>
            <div class="bot-info">
                <h3>Akki Bot AI</h3>
                <div class="bot-status">
                    <span class="status-dot"></span>
                    <span>Online & Ready</span>
                </div>
            </div>
        </div>

        <!-- Messages Area -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-msg">
                Hello Akki! Main aapka customized AI assistant hoon. Main aaj aapki kya help kar sakta hoon?
            </div>
        </div>

        <!-- Input Box -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Type a professional message..." autocomplete="off">
            </div>
            <button class="send-btn" id="sendBtn">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script>
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            // Append User Message UI
            appendMessage(text, 'user-msg');
            userInput.value = '';

            try {
                // Fetch Request to your backend route
                const response = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                
                const data = await response.json();
                
                // Append Bot Response UI
                if (data.reply) {
                    appendMessage(data.reply, 'bot-msg');
                } else {
                    appendMessage("Error: Something went wrong.", 'bot-msg');
                }
            } catch (error) {
                appendMessage("Server unreachable. Please check connection.", 'bot-msg');
            }
        }

        // FIXED FUNCTION: Added missing element creation line
        function appendMessage(text, className) {
            const msgDiv = document.createElement('div');
            msgDiv.classList.add('message', className);
            msgDiv.innerText = text;
            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight; // Auto Scroll to bottom
        }

        sendBtn.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });
    </script>
</body>
</html>
