<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akki Bot AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-main: #140b07;
            --panel-bg: #22120b;
            --accent-cream: #f4eee1;
            --text-main: #ffffff;
            --text-dark: #140b07;
            --user-bubble: #3a2216;
            --border-glow: rgba(244, 238, 225, 0.12);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            background-image: radial-gradient(circle at top right, #2d180f 0%, #140b07 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
        }

        .container {
            width: 95%;
            max-width: 900px;
            height: 85vh;
            background: rgba(34, 18, 11, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-glow);
            border-radius: 28px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
        }

        .header {
            padding: 24px 32px;
            background: rgba(20, 11, 7, 0.6);
            border-bottom: 1px solid var(--border-glow);
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-top-left-radius: 28px;
            border-top-right-radius: 28px;
        }

        .bot-profile {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #ffffff, var(--accent-cream));
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 700;
            color: var(--text-dark);
            box-shadow: 0 8px 20px rgba(244, 238, 225, 0.15);
        }

        .bot-meta h1 {
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #a3e635;
            margin-top: 2px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: #a3e635;
            border-radius: 50%;
            box-shadow: 0 0 10px #a3e635;
        }

        .chat-area {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-area::-webkit-scrollbar {
            width: 5px;
        }
        .chat-area::-webkit-scrollbar-thumb {
            background: rgba(244, 238, 225, 0.1);
            border-radius: 10px;
        }

        .msg {
            max-width: 80%;
            padding: 16px 24px;
            border-radius: 20px;
            font-size: 0.98rem;
            line-height: 1.6;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .user-msg {
            background-color: var(--user-bubble);
            color: var(--text-main);
            align-self: flex-end;
            border-bottom-right-radius: 4px;
            border: 1px solid rgba(244, 238, 225, 0.05);
        }

        .bot-msg {
            background-color: var(--accent-cream);
            color: var(--text-dark);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
        }

        .footer {
            padding: 24px 32px;
            background: rgba(20, 11, 7, 0.6);
            border-top: 1px solid var(--border-glow);
            border-bottom-left-radius: 28px;
            border-bottom-right-radius: 28px;
        }

        .input-box {
            display: flex;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(244, 238, 225, 0.15);
            border-radius: 18px;
            padding: 8px 8px 8px 20px;
            align-items: center;
            transition: all 0.3s ease;
        }

        .input-box:focus-within {
            border-color: rgba(244, 238, 225, 0.4);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 20px rgba(244, 238, 225, 0.05);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-main);
            font-size: 1rem;
        }

        input::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        button {
            background: var(--accent-cream);
            color: var(--text-dark);
            border: none;
            outline: none;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button:hover {
            background: #ffffff;
            transform: translateY(-1px);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="bot-profile">
                <div class="avatar">⚡</div>
                <div class="bot-meta">
                    <h1>Akki Bot</h1>
                    <div class="status">
                        <div class="status-dot"></div>
                        <span>Llama 3.3 Engine • Active</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="msg bot-msg">
                Hey Akki! New premium UI integration complete. Pucho kya puchna hai!
            </div>
        </div>

        <div class="footer">
            <div class="input-box">
                <input type="text" id="userInput" placeholder="Ask Akki Bot anything..." onkeypress="checkKey(event)">
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const chatArea = document.getElementById('chatArea');
        const userInput = document.getElementById('userInput');

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            chatArea.innerHTML += `<div class="msg user-msg">${text}</div>`;
            chatArea.scrollTop = chatArea.scrollHeight;

            const tempId = 'load-' + Date.now();
            chatArea.innerHTML += `<div class="msg bot-msg" id="${tempId}">Thinking...</div>`;
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const res = await fetch('/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: text })
                });
                const data = await res.json();
                document.getElementById(tempId).outerHTML = `<div class="msg bot-msg">${data.reply}</div>`;
            } catch (err) {
                document.getElementById(tempId).outerHTML = `<div class="msg bot-msg" style="color: #f87171;">Connection error.</div>`;
            }
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function checkKey(e) {
            if (e.key === 'Enter') sendMessage();
        }
    </script>
</body>
</html>
