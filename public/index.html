<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Akki Bot Pro — Ultimate AI</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Nunito:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root { 
    --bg: #FFF6EC; --surface: #FFFFFF; --coral-deep: #F16A50; 
    --honey: #C9884F; --honey-light: #F2C79A; --violet: #7C6AE8; 
    --border: #F1E4D8; --text: #3B2E27; --chat-bot: #FFF1E6;
  }
  [data-theme="dark"] {
    --bg: #1A120B; --surface: #2C1E11; --coral-deep: #FF7A5A;
    --honey: #E6A15C; --honey-light: #4A3525; --violet: #9485F5;
    --border: #3D2A19; --text: #F5EBE6; --chat-bot: #3D2A19;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; transition: background 0.3s, color 0.3s; }
  body { 
    font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text);
    height: 100dvh; display: flex; flex-direction: column; align-items: center; 
    overflow: hidden; padding: 10px;
  }
  .container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; }
  .header { text-align: center; padding: 10px 0; position: relative; display: flex; justify-content: center; align-items: center; gap: 15px; }
  
  .controls-wrapper { position: absolute; right: 0; top: 10px; display: flex; gap: 10px; align-items: center; }
  .control-btn { cursor: pointer; font-size: 20px; background: none; border: none; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; }
  
  /* Prompt Mode Toggle Switch */
  .prompt-toggle-btn { background: var(--border); border: 2px solid var(--honey); padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold; cursor: pointer; color: var(--text); }
  .prompt-toggle-btn.active { background: var(--honey); color: white; }

  .chat-shell {
    flex: 1; background: var(--surface); border-radius: 30px;
    display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border);
  }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 16px; }
  
  .msg-row { display: flex; width: 100%; gap: 10px; align-items: flex-end; position: relative; }
  .msg-row.user { flex-direction: row-reverse; }
  
  /* Animated Avatar Setup */
  .avatar { width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; border: 1px solid var(--border); }
  .msg-row.bot .avatar { background: var(--chat-bot); animation: pulse 2s infinite ease-in-out; }
  .msg-row.user .avatar { background: var(--violet); color: white; }

  @keyframes pulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.05); }
    100% { transform: scale(1); }
  }

  .msg { max-width: 75%; padding: 12px 16px; border-radius: 18px; font-size: 14.5px; line-height: 1.45; word-break: break-word; position: relative; }
  .msg.bot { background: var(--chat-bot); color: var(--text); border-bottom-left-radius: 4px; }
  .msg.user { background: var(--violet); color: white; border-bottom-right-radius: 4px; }
  
  .action-buttons { display: flex; gap: 8px; margin-top: 6px; align-items: center; }
  .inline-btn { background: none; border: none; cursor: pointer; font-size: 13px; opacity: 0.5; transition: opacity 0.2s; }
  .inline-btn:hover { opacity: 1; }
  
  .preview-box { display: none; padding: 8px 15px; background: var(--bg); border-top: 1px solid var(--border); align-items: center; gap: 10px; }
  .preview-box img { height: 40px; border-radius: 5px; }
  .preview-box button { background: none; border: none; color: var(--coral-deep); font-weight: bold; cursor: pointer; }

  .input-area { padding: 15px; border-top: 1px solid var(--border); display: flex; align-items: center; gap: 8px; background: var(--surface); }
  input[type="text"] { flex: 1; padding: 12px 18px; border-radius: 25px; border: 2px solid var(--border); background: var(--surface); color: var(--text); outline: none; }
  .icon-btn, .send-btn { width: 42px; height: 42px; border-radius: 50%; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .send-btn { background: var(--coral-deep); color: white; }
</style>
</head>
<body data-theme="light">
<div class="container">
  <div class="header">
    <h3 style="font-family: 'Fredoka';">Akki Bot Pro <span id="botFace">🐻</span></h3>
    <div class="controls-wrapper">
      <button class="prompt-toggle-btn" id="promptModeToggle">🤖 NORMAL MODE</button>
      <button class="control-btn" id="muteToggle" title="Mute/Unmute Speech">🔊</button>
      <button class="control-btn" id="themeToggle" title="Toggle Dark Mode">☀️</button>
    </div>
  </div>
  <div class="chat-shell">
    <div class="messages" id="messages"></div>
    
    <div class="preview-box" id="previewBox">
      <img src="" id="imgPreview">
      <span id="imgName"></span>
      <button id="removeImgBtn">✕</button>
    </div>

    <div class="input-area">
      <input type="file" id="fileInput" accept="image/*" style="display: none;">
      <button class="icon-btn" onclick="document.getElementById('fileInput').click()">📁</button>
      <button class="icon-btn" id="voiceBtn">🎤</button>
      <input type="text" id="userInput" placeholder="Ask anything..." autocomplete="off">
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<script>
  const buildKey = () => "gsk_ND2eENV0" + "uOwTJ1ulrZsZ" + "WGdyb3FYNogr" + "Sf2Up5jWLsntS" + "2ihRsAe";
  
  let chatHistory = JSON.parse(localStorage.getItem('akki_bot_history')) || [
    { role: "bot", text: "Hello! Main Akki Bot Pro hoon. Memory, Vision, Voice aur Video Prompting engine ke sath ready!" }
  ];
  
  let isMuted = localStorage.getItem('akki_bot_muted') === 'true';
  let promptMode = localStorage.getItem('akki_prompt_mode') || 'normal'; // normal or video

  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const themeToggle = document.getElementById('themeToggle');
  const muteToggle = document.getElementById('muteToggle');
  const promptModeToggle = document.getElementById('promptModeToggle');
  const fileInput = document.getElementById('fileInput');
  const previewBox = document.getElementById('previewBox');
  const imgPreview = document.getElementById('imgPreview');
  const imgName = document.getElementById('imgName');
  const removeImgBtn = document.getElementById('removeImgBtn');
  const voiceBtn = document.getElementById('voiceBtn');
  const botFace = document.getElementById('botFace');

  let base64Image = null;

  // Initial Sync Logic
  muteToggle.textContent = isMuted ? '🔇' : '🔊';
  updatePromptToggleUI();

  function updatePromptToggleUI() {
    if(promptMode === 'video') {
      promptModeToggle.textContent = "🎬 PROMPT MODE";
      promptModeToggle.classList.add('active');
    } else {
      promptModeToggle.textContent = "🤖 NORMAL MODE";
      promptModeToggle.classList.remove('active');
    }
  }

  promptModeToggle.addEventListener('click', () => {
    promptMode = promptMode === 'normal' ? 'video' : 'normal';
    localStorage.setItem('akki_prompt_mode', promptMode);
    updatePromptToggleUI();
  });

  muteToggle.addEventListener('click', () => {
    isMuted = !isMuted;
    muteToggle.textContent = isMuted ? '🔇' : '🔊';
    localStorage.setItem('akki_bot_muted', isMuted);
    if(isMuted) window.speechSynthesis.cancel();
  });

  themeToggle.addEventListener('click', () => {
    const isDark = document.body.getAttribute('data-theme') === 'dark';
    document.body.setAttribute('data-theme', isDark ? 'light' : 'dark');
    themeToggle.textContent = isDark ? '☀️' : '🌙';
  });

  // Markdown formatting logic helper
  function formatMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.*?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  // Master UI Renderer
  function render() {
    messagesEl.innerHTML = '';
    chatHistory.forEach((m, idx) => {
      const row = document.createElement('div');
      row.className = `msg-row ${m.role}`;

      const avatar = document.createElement('div');
      avatar.className = 'avatar';
      avatar.textContent = m.role === 'bot' ? '🐻' : '👤';
      row.appendChild(avatar);

      const d = document.createElement('div');
      d.className = `msg ${m.role}`;
      d.innerHTML = formatMarkdown(m.text);
      
      if(m.role === 'bot') {
        const btnWrapper = document.createElement('div');
        btnWrapper.className = 'action-buttons';
        
        // Speak Trigger
        const ttsBtn = document.createElement('button');
        ttsBtn.className = 'inline-btn';
        ttsBtn.textContent = '🗣️';
        ttsBtn.onclick = () => speak(m.text, true); 
        btnWrapper.appendChild(ttsBtn);

        // Copy Clipboard Trigger
        const copyBtn = document.createElement('button');
        copyBtn.className = 'inline-btn';
        copyBtn.textContent = '📋';
        copyBtn.title = "Copy text";
        copyBtn.onclick = () => {
          navigator.clipboard.writeText(m.text);
          copyBtn.textContent = '✅';
          setTimeout(() => copyBtn.textContent = '📋', 1500);
        };
        btnWrapper.appendChild(copyBtn);
        
        d.appendChild(btnWrapper);
      }
      
      row.appendChild(d);
      messagesEl.appendChild(row);
    });
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // Typewriter Streaming Engine Simulation
  function streamBotReply(fullText) {
    botFace.textContent = '🧐'; // Change face to thinking/speaking state
    const row = document.createElement('div');
    row.className = 'msg-row bot';

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = '🐻';
    row.appendChild(avatar);

    const d = document.createElement('div');
    d.className = 'msg bot';
    row.appendChild(d);
    messagesEl.appendChild(row);
    
    let currentIdx = 0;
    // Speed optimization mapping rule array
    const words = fullText.split(' ');
    
    function typeWord() {
      if (currentIdx < words.length) {
        d.innerHTML = formatMarkdown(words.slice(0, currentIdx + 1).join(' '));
        messagesEl.scrollTop = messagesEl.scrollHeight;
        currentIdx++;
        setTimeout(typeWord, 40); // 40ms dynamic delay per word stream
      } else {
        // Stream completed process injection
        botFace.textContent = '🐻'; // Back to standard face avatar
        chatHistory.push({role: 'bot', text: fullText});
        localStorage.setItem('akki_bot_history', JSON.stringify(chatHistory));
        render(); // Clean rebuild with complete button event attachments
        speak(fullText);
      }
    }
    typeWord();
  }

  function speak(text, forceSpeak = false) {
    if (isMuted && !forceSpeak) return;
    window.speechSynthesis.cancel();
    const synth = window.speechSynthesis;
    const utterance = new SpeechSynthesisUtterance(text.replace(/[^\w\s\u0900-\u097F]/g, ''));
    utterance.lang = 'hi-IN';
    synth.speak(utterance);
  }

  // Mic STT Trigger React Actions
  const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  rec.lang = 'hi-IN';
  voiceBtn.onclick = () => {
    botFace.textContent = '👂'; // Change expression to listening
    rec.start();
  };
  rec.onresult = (e) => {
    inputEl.value = e.results[0][0].transcript;
    botFace.textContent = '🐻';
  };
  rec.onerror = () => botFace.textContent = '🐻';

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
      imgName.textContent = file.name.substring(0, 10) + "...";
      const reader = new FileReader();
      reader.onload = function(evt) {
        imgPreview.src = evt.target.result;
        base64Image = evt.target.result.split(',')[1];
        previewBox.style.display = 'flex';
      };
      reader.readAsDataURL(file);
    }
  });

  removeImgBtn.addEventListener('click', () => {
    base64Image = null;
    fileInput.value = '';
    previewBox.style.display = 'none';
  });

  async function handleSend() {
    const text = inputEl.value.trim();
    if(!text && !base64Image) return;
    
    chatHistory.push({role: 'user', text: text || "Sent an image 🖼️"});
    inputEl.value = '';
    
    const activeImage = base64Image;
    if(activeImage) removeImgBtn.click();
    
    render();
    botFace.textContent = '🤔'; // Thinking Face on fetch API triggered

    // Local Tool Check (MCP Lite)
    const match = text.toLowerCase();
    if(match.includes('time') || match.includes('samay') || match.includes('waqt')) {
      const liveTime = new Date().toLocaleString('en-IN', { timeZone: 'Asia/Kolkata', hour: '2-digit', minute: '2-digit', hour12: true });
      const reply = `Akki Bhai, abhi time ho raha hai: ${liveTime} 🕒`;
      streamBotReply(reply);
      return;
    }

    // Dynamic Context Switch Routing (Normal vs Video Prompt Mode)
    let systemPrompt = "You are Akki Bot Pro, a creative assistant with system memory, tools, and vision skills. Keep answers crisp.";
    if (promptMode === 'video') {
      systemPrompt = "You are Akki Bot Pro, an elite AI Video Production and Prompt Engineering expert created by Akki (Gernative Akki). Your sole job is to generate cinematic, ultra-detailed 4K prompt frameworks for tools like Midjourney, Runway, and Sora. Focus heavily on lighting, dynamic fight scenes, high-fidelity camera angles, and hyper-realistic scene composition.";
    }

    let payload = {
      model: activeImage ? "llama-3.2-11b-vision-preview" : "llama-3.3-70b-versatile",
      messages: [{ role: "system", content: systemPrompt }],
      temperature: 0.7
    };

    if (activeImage) {
      payload.messages.push({
        role: "user",
        content: [
          { type: "text", text: text || "Analyze this image." },
          { type: "image_url", image_url: { url: `data:image/jpeg;base64,${activeImage}` } }
        ]
      });
    } else {
      payload.messages.push({ role: "user", content: text });
    }

    try {
      const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
        method: "POST",
        headers: {"Content-Type": "application/json", "Authorization": "Bearer " + buildKey()},
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      const reply = data.choices[0].message.content;
      
      streamBotReply(reply);
    } catch(e) { 
      streamBotReply("System architecture data block face kar raha hai! 🐻");
    }
  }

  sendBtn.addEventListener('click', handleSend);
  inputEl.addEventListener('keypress', (e) => { if (e.key === 'Enter') handleSend(); });
  render();
</script>
</body>
</html>
